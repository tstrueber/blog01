title: Timos Blog
description: Notizen, Ideen und Projekte.
author:
  name: Timo
lang: de
locale: de-DE
url: "https://tstrueber.github.io"
baseurl: "/blog01"

remote_theme: "mmistakes/minimal-mistakes@4.26.2"
minimal_mistakes_skin: "air"

plugins:
  - jekyll-feed
  - jekyll-remote-theme
  - jekyll-include-cache

# Navigation
navigation:
  main:
    - title: "Start"
      url: /blog01/
    - title: "Über mich"
      url: /blog01/about/

# Defaults
defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: false
      read_time: false
      share: false
      related: false
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: false

<style>
  /* ── Dark-mode colour overrides ── */
  html.dark-mode {
    color-scheme: dark;
  }
  html.dark-mode body {
    background-color: #1a1a2e;
    color: #dde1e7;
  }
  html.dark-mode .masthead,
  html.dark-mode .masthead__inner-wrap,
  html.dark-mode .greedy-nav {
    background-color: #16213e;
    border-bottom-color: #0f3460;
  }
  html.dark-mode .greedy-nav a,
  html.dark-mode .site-title {
    color: #dde1e7;
  }
  html.dark-mode .greedy-nav a:hover {
    color: #a0c4ff;
  }
  html.dark-mode .greedy-nav .visible-links a:before {
    background: #a0c4ff;
  }
  html.dark-mode .page__content,
  html.dark-mode .page__content p {
    color: #dde1e7;
  }
  html.dark-mode .page__content a {
    color: #a0c4ff;
  }
  html.dark-mode h1, html.dark-mode h2, html.dark-mode h3,
  html.dark-mode h4, html.dark-mode h5, html.dark-mode h6 {
    color: #f0f0f0;
  }
  html.dark-mode .archive__item-title a {
    color: #c0d8ff;
  }
  html.dark-mode .archive__item-excerpt {
    color: #b0b8c8;
  }
  html.dark-mode .page__footer {
    background-color: #16213e;
    color: #9aaabb;
  }
  html.dark-mode .page__footer a {
    color: #a0c4ff;
  }
  html.dark-mode pre,
  html.dark-mode code {
    background-color: #0d1b2a;
    color: #c9d1d9;
  }

  /* ── Dark-mode toggle button ── */
  #dm-toggle {
    background: none;
    border: 1px solid currentColor;
    border-radius: 999px;
    cursor: pointer;
    font-size: 1rem;
    line-height: 1;
    padding: 0.2rem 0.55rem;
    margin-left: 0.6rem;
    color: inherit;
    vertical-align: middle;
  }
  #dm-toggle:hover {
    opacity: 0.75;
  }

  /* ── Social icon links ── */
  .custom-social-links {
    display: inline-flex;
    align-items: center;
    gap: 0.45rem;
    margin-left: 0.75rem;
  }
  .custom-social-links a {
    color: inherit;
    font-size: 1.15rem;
    display: inline-flex;
    align-items: center;
    padding: 0.15rem 0.2rem;
    transition: opacity 0.2s;
  }
  .custom-social-links a:hover {
    opacity: 0.7;
  }
  html.dark-mode .custom-social-links a {
    color: #dde1e7;
  }
</style>

<!-- Apply dark mode before first paint to avoid flash -->
<script>
  (function () {
    var stored = localStorage.getItem('darkMode');
    var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    if (stored === 'true' || (stored === null && prefersDark)) {
      document.documentElement.classList.add('dark-mode');
    }
  })();
</script>
